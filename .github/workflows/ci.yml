name: CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake g++

    - name: Build and run tests
      run: |
        cd zadanie5_2
        mkdir build && cd build
        cmake ..
        make -j4
        ./test_isprime
